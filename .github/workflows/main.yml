name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.sdk }} / ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # luci-theme-goflow 的 LUCI_PKGARCH=all（纯模板/CSS/JS，无编译代码），
        # 所有架构产出的 .ipk/.apk 字节完全一致，只需要一个组合即可。
        # 选择 aarch64_cortex-a53 对应 GL.iNet AX1800 (IPQ6000) 的 CPU 架构。
        arch: [aarch64_cortex-a53]
        sdk: [openwrt-25.12]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build package
        uses: openwrt/gh-action-sdk@v11
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: luci_theme_goflow
          PACKAGES: luci-theme-goflow
          NO_REFRESH_CHECK: true
          V: s

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: luci-theme-goflow-${{ matrix.sdk }}-${{ matrix.arch }}
          path: |
            bin/packages/${{ matrix.arch }}/luci_theme_goflow/*.ipk
            bin/packages/${{ matrix.arch }}/luci_theme_goflow/*.apk
          if-no-files-found: warn

  release:
    name: Publish release assets
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      # 所有矩阵组合产出完全相同的包（arch=all），文件名也一样，
      # 下载多份只会互相覆盖。只发布一份即可。
      - name: Download canonical build artifact
        uses: actions/download-artifact@v6
        with:
          name: luci-theme-goflow-openwrt-25.12-aarch64_cortex-a53
          path: artifacts

      - name: Rename assets to the tag name
        run: |
          cd artifacts
          for f in *.apk *.ipk; do
            [ -e "$f" ] || continue
            mv "$f" "luci-theme-goflow-${GITHUB_REF_NAME}.${f##*.}"
          done
          ls -la

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*.*pk
